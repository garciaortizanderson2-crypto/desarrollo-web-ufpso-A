<!-- CSS propio-->
 <link rel="stylesheet" href="Stylos.css">
<body>

            <a class="navbar-brand" href="#">TechNova</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"

                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />

                </form>
            </div>
        </div>

    <!-- CONTENIDO -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-4">

                        <a href="#" class="btn btn-primary">ver más</a>
                    </div>
                </div>
            </div>
            <div class="col-4">

                    <img src="https://w7.pngwing.com/pngs/169/248/png-transparent-toyota-hilux-car-toyota-fortuner-toyota-revo-hilux-truck-headlamp-car.png"

            </div>
            <div class="col-4">

                        <a href="#" class="btn btn-primary">ver más</a>
                    </div>
                </div>
            </div>
            <!-- FORMULARIO -->
            <div class="row mt-5" id="login">
                <div class="col-6 mx-auto">
                    <h3 class="text-center">Inicia sesión</h3>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="emial" class="form-label">Correo</label>
                            <input type="email" class="form-control" id="email" aria-describedby="emailHelp">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password">
                        </div>
                        <button type="submit" class="btn btn-primary">Ingresar</button>
                    </form>
                    <div id="message" class="mt-3 text-center"></div>
                </div>
            </div>

        </div>
    </div>
    <!--VENTANA MODAL-->

    <!-- Button trigger modal -->
    <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#exampleModal">
        Launch demo modal
    </button>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Información</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Has hecho clic en "Ver más" :
                </div>
            </div>
        </div>
    </div>
